server:
  port: 8080

spring:
  application:
    name: skills-finder

  datasource:
    url: jdbc:postgresql://${DB_HOST:106.14.112.139}:5432/postgres
    username: ${DB_USER:agent1223}
    password: ${DB_PWD:agent1223}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:106.14.112.139}
      port: 6379
      password: ${REDIS_PWD:}
      timeout: 5000ms

github:
  api:
    token: "${GITHUB_TOKEN:-}"
    base-url: https://api.github.com
    search-url: https://api.github.com/search/repositories

logging:
  level:
    com.skillsfinder: INFO
    org.springframework.web: INFO
