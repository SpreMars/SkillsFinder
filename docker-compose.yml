version: '3.8'

services:
  postgres:
    image: postgres:18.3-alpine
    container_name: skillsfinder-postgres
    environment:
      POSTGRES_USER: agent1223
      POSTGRES_PASSWORD: agent1223
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:8-alpine
    container_name: skillsfinder-redis
    command: redis-server --requirepass ""
    volumes:
      - redis-data:/data
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillsfinder-backend
    depends_on:
      - postgres
      - redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/postgres
      - SPRING_DATASOURCE_USERNAME=agent1223
      - SPRING_DATASOURCE_PASSWORD=agent1223
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=
    networks:
      - app-network
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillsfinder-frontend
    depends_on:
      - backend
    networks:
      - app-network
    ports:
      - "80:80"

volumes:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge
