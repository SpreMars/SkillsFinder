version: '3.8'

services:
  postgres:
    image: postgres:18.3-alpine
    container_name: skillsfinder-postgres
    environment:
      POSTGRES_USER: agent1223
      POSTGRES_PASSWORD: agent1223
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-data.sql:/docker-entrypoint-initdb.d/init-data.sql:ro
    networks:
      - app-network

  redis:
    image: redis:8-alpine
    container_name: skillsfinder-redis
    command: redis-server --requirepass ""
    volumes:
      - redis-data:/data
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillsfinder-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_USER=agent1223
      - DB_PWD=agent1223
      - REDIS_HOST=redis
      - REDIS_PWD=
    networks:
      - app-network
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillsfinder-frontend
    depends_on:
      - backend
    networks:
      - app-network
    ports:
      - "80:80"

volumes:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge
