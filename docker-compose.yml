version: '3.8'

services:
  postgres:
    image: postgres:18.3-alpine
    container_name: skillsfinder-postgres
    environment:
      POSTGRES_USER: agent1223
      POSTGRES_PASSWORD: agent1223
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-data.sql:/docker-entrypoint-initdb.d/init-data.sql:ro
    networks:
      - app-network

  redis:
    image: redis:8-alpine
    container_name: skillsfinder-redis
    command: redis-server --requirepass ""
    volumes:
      - redis-data:/data
    networks:
      - app-network

  backend:
    image: eclipse-temurin:17-jre-alpine
    container_name: skillsfinder-backend
    volumes:
      - ./backend/target/backend-1.0.0.jar:/app/app.jar
    working_dir: /app
    command: ["java", "-jar", "app.jar"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_USER=agent1223
      - DB_PWD=agent1223
      - REDIS_HOST=redis
      - REDIS_PWD=
    networks:
      - app-network
    ports:
      - "8080:8080"

  frontend:
    image: nginx:alpine
    container_name: skillsfinder-frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge
