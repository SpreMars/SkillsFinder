version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillsfinder-backend
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillsfinder-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
